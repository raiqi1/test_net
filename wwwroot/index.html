<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chat App</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { background: white; width: 400px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; height: 600px; }
        .header { background: #075e54; color: white; padding: 16px; font-size: 18px; font-weight: bold; }
        .header span { font-size: 13px; font-weight: normal; opacity: 0.8; display: block; }
        #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 8px 12px; border-radius: 8px; max-width: 80%; font-size: 14px; line-height: 1.4; }
        .msg.system { background: #e8f5e9; color: #555; align-self: center; font-style: italic; font-size: 12px; border-radius: 20px; }
        .msg.other { background: #f1f0f0; align-self: flex-start; }
        .msg.me { background: #dcf8c6; align-self: flex-end; }
        .msg .sender { font-weight: bold; font-size: 12px; color: #075e54; margin-bottom: 2px; }
        .input-area { display: flex; padding: 12px; gap: 8px; border-top: 1px solid #eee; }
        #msgInput { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 20px; outline: none; font-size: 14px; }
        button { background: #075e54; color: white; border: none; padding: 10px 16px; border-radius: 20px; cursor: pointer; font-size: 14px; }
        button:hover { background: #064e47; }
        .login { display: flex; flex-direction: column; gap: 12px; padding: 40px; }
        .login h2 { color: #075e54; }
        .login input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
        .login button { border-radius: 8px; padding: 12px; }
        #status { font-size: 12px; color: #999; text-align: center; padding: 4px; }
    </style>
</head>
<body>
<div class="container" id="loginScreen">
    <div class="header">💬 Chat App</div>
    <div class="login">
        <h2>Join the Chat</h2>
        <input type="text" id="usernameInput" placeholder="Your username..." maxlength="20"/>
        <button onclick="connect()">Join Chat</button>
    </div>
</div>

<div class="container" id="chatScreen" style="display:none;">
    <div class="header">
        💬 Chat App
        <span id="statusText">Connecting...</span>
    </div>
    <div id="messages"></div>
    <div id="status"></div>
    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendMessage()"/>
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    let ws;
    let myUsername = "";

    function connect() {
        const input = document.getElementById("usernameInput").value.trim();
        if (!input) return alert("Please enter a username first!");

        myUsername = input;
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("chatScreen").style.display = "flex";

        ws = new WebSocket(`ws://localhost:5189/ws`);

        ws.onopen = () => {
            ws.send(myUsername); // send username first
            document.getElementById("statusText").textContent = `Logged in as ${myUsername}`;
        };

        ws.onmessage = (event) => {
            const text = event.data;
            const messages = document.getElementById("messages");

            const div = document.createElement("div");

            if (text.startsWith("[") && text.endsWith("]")) {
                div.className = "msg system";
                div.textContent = text;
            } else {
                const colonIdx = text.indexOf(": ");
                const sender = text.substring(0, colonIdx);
                const content = text.substring(colonIdx + 2);

                div.className = sender === myUsername ? "msg me" : "msg other";
                div.innerHTML = `<div class="sender">${sender}</div>${content}`;
            }

            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        };

        ws.onclose = () => {
            document.getElementById("statusText").textContent = "Disconnected";
        };
    }

    function sendMessage() {
        const input = document.getElementById("msgInput");
        const msg = input.value.trim();
        if (!msg || ws.readyState !== WebSocket.OPEN) return;
        ws.send(msg);
        input.value = "";
    }
</script>
</body>
</html>
